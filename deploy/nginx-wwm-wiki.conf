# WWM Wiki — nginx site config (SPA + static assets)
# Скопируйте на сервер: /etc/nginx/sites-available/wwm-wiki
# Замените wwm-wiki.example.ru на ваш домен.

# HTTP → HTTPS (раскомментируйте после получения сертификата certbot)
# server {
#     listen 80;
#     listen [::]:80;
#     server_name wwm-wiki.example.ru www.wwm-wiki.example.ru;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    listen [::]:80;
    server_name wwm-wiki.example.ru www.wwm-wiki.example.ru;

    root /var/www/wwm-wiki;
    index index.html;

    # После certbot --nginx эти строки будут дополнены блоком listen 443 ssl
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    charset utf-8;
    client_max_body_size 10m;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Vite hashed assets — долгий кэш
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Изображения
    location /images/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # Service worker — без долгого кэша (обновления после деплоя)
    location = /service-worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # index.html — всегда свежий (SPA shell)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # SEO-файлы
    location = /sitemap.xml {
        default_type application/xml;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
        try_files $uri =404;
    }

    location = /robots.txt {
        default_type text/plain;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
        try_files $uri =404;
    }

    location = /site.webmanifest {
        default_type application/manifest+json;
        try_files $uri =404;
    }

    # SPA: все маршруты → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Скрыть dotfiles
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
