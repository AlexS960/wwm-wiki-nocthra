# WWM Wiki — оркестрация на FirstVDS
# sync-api + (опционально) nginx в Docker. Supabase — отдельно через setup-supabase-docker.sh
#
# Запуск sync-api:
#   docker compose -f deploy/docker-compose.yml up -d sync-api
#
# Полный стек Supabase: deploy/setup-supabase-docker.sh → deploy/supabase-upstream/docker

services:
  sync-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.sync-api
    restart: unless-stopped
    env_file:
      - path: .env.selfhosted
        required: false
    environment:
      SYNC_API_PORT: "3001"
      SYNC_API_HOST: "0.0.0.0"
      NODE_ENV: production
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      # Парсеры пишут в uploads/ и читают src/data/
      - ../uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Nginx в Docker — альтернатива системному nginx на хосте.
  # Раскомментируйте, если не используете /etc/nginx/sites-available/wwm-wiki
  # nginx:
  #   image: nginx:1.27-alpine
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - /var/www/wwm-wiki:/var/www/wwm-wiki:ro
  #     - ./nginx-full-stack.conf:/etc/nginx/conf.d/default.conf:ro
  #     - /etc/letsencrypt:/etc/letsencrypt:ro
  #   depends_on:
  #     - sync-api
