name: Deploy to FirstVDS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-firstvds
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_PATH: ${{ secrets.REMOTE_PATH }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SITE_URL: ${{ secrets.VITE_SITE_URL }}
        run: |
          set -euo pipefail
          missing=0
          for name in SSH_HOST SSH_USER SSH_PRIVATE_KEY REMOTE_PATH VITE_SUPABASE_URL VITE_SUPABASE_ANON_KEY VITE_SITE_URL; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub secret: $name (Settings → Secrets and variables → Actions)"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          echo "All required secrets are set."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SITE_URL: ${{ secrets.VITE_SITE_URL }}
          VITE_BUILD_TIME: ${{ github.event.head_commit.timestamp || github.run_id }}
          VITE_GOOGLE_SITE_VERIFICATION: ${{ secrets.VITE_GOOGLE_SITE_VERIFICATION }}
          VITE_YANDEX_VERIFICATION: ${{ secrets.VITE_YANDEX_VERIFICATION }}
          VITE_BING_SITE_VERIFICATION: ${{ secrets.VITE_BING_SITE_VERIFICATION }}
        run: npm run deploy:build

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Configure SSH known_hosts
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          set -euo pipefail
          HOST="${SSH_HOST#https://}"
          HOST="${HOST#http://}"
          HOST="${HOST%%/*}"
          HOST="${HOST%%:*}"
          if [ -z "$HOST" ]; then
            echo "::error::SSH_HOST is empty or invalid"
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if ! ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null; then
            echo "::error::ssh-keyscan failed for host: $HOST — check SSH_HOST secret (IP only, e.g. 62.109.19.21)"
            exit 1
          fi
          echo "SSH known_hosts configured for: $HOST"

      - name: Test SSH connection
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail
          HOST="${SSH_HOST#https://}"
          HOST="${HOST#http://}"
          HOST="${HOST%%/*}"
          ssh -o BatchMode=yes -o ConnectTimeout=15 -o StrictHostKeyChecking=yes \
            "${SSH_USER}@${HOST}" "echo 'SSH OK' && whoami"

      - name: Deploy dist/ to VPS
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          REMOTE_PATH: ${{ secrets.REMOTE_PATH }}
        run: |
          set -euo pipefail
          HOST="${SSH_HOST#https://}"
          HOST="${HOST#http://}"
          HOST="${HOST%%/*}"
          ssh -o StrictHostKeyChecking=yes "${SSH_USER}@${HOST}" "mkdir -p '${REMOTE_PATH}'"
          rsync -avz --delete -e "ssh -o StrictHostKeyChecking=yes" dist/ "${SSH_USER}@${HOST}:${REMOTE_PATH}/"
          echo "Deployed to ${REMOTE_PATH} on ${HOST}"

      - name: Post-deploy (optional)
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          VPS_POST_DEPLOY_CMD: ${{ secrets.VPS_POST_DEPLOY_CMD }}
        run: |
          if [ -z "${VPS_POST_DEPLOY_CMD}" ]; then
            echo "VPS_POST_DEPLOY_CMD not set — skip"
            exit 0
          fi
          HOST="${SSH_HOST#https://}"
          HOST="${HOST#http://}"
          HOST="${HOST%%/*}"
          ssh -o StrictHostKeyChecking=yes "${SSH_USER}@${HOST}" "${VPS_POST_DEPLOY_CMD}"

      - name: Verify site is live
        env:
          VITE_SITE_URL: ${{ secrets.VITE_SITE_URL }}
        run: |
          set -euo pipefail
          SITE="${VITE_SITE_URL:-https://wwm-wiki-nocthra.ru}"
          SITE="${SITE%/}"
          echo "Checking ${SITE}/health.json"
          curl -sf "${SITE}/health.json" | head -c 500
          echo ""
          curl -sfI "${SITE}/" | head -5
